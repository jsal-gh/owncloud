version: '3.8'
volumes:
  files:
    driver: local
  mysql:
    driver: local
  redis:
    driver: local
services:
  owncloud:
    image: 'owncloud/server:${OWNCLOUD_VERSION:-10.13}'
    container_name: owncloud_server
    restart: always
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - 'OWNCLOUD_DOMAIN=${OWNCLOUD_DOMAIN}'
      - OWNCLOUD_TRUSTED_DOMAINS=${OWNCLOUD_DOMAIN}
      - OWNCLOUD_OVERWRITE_PROTOCOL=https
      - OWNCLOUD_OVERWRITE_WEBHOST=${OWNCLOUD_DOMAIN}
      - 'OWNCLOUD_OVERWRITE_CLI_URL=https://${OWNCLOUD_DOMAIN}'
      - OWNCLOUD_OVERWRITE_CONDITIONAL_IP=172.16.0.0/12
      - OWNCLOUD_DB_TYPE=mysql
      - OWNCLOUD_DB_NAME=owncloud
      - OWNCLOUD_DB_USERNAME=owncloud
      - 'OWNCLOUD_DB_PASSWORD=${DB_PASSWORD:-owncloud}'
      - OWNCLOUD_DB_HOST=mariadb
      - 'OWNCLOUD_ADMIN_USERNAME=${ADMIN_USERNAME}'
      - 'OWNCLOUD_ADMIN_PASSWORD=${ADMIN_PASSWORD}'
      - OWNCLOUD_MYSQL_UTF8MB4=true
      - OWNCLOUD_REDIS_ENABLED=true
      - OWNCLOUD_REDIS_HOST=redis
    healthcheck:
      test:
        - CMD
        - /usr/bin/healthcheck
      interval: 30s
      timeout: 10s
      retries: 5
    volumes:
      - 'files:/mnt/data'
    labels:
      - traefik.enable=true
      - 'traefik.http.routers.owncloud.rule=Host(`${OWNCLOUD_DOMAIN}`)'
      - traefik.http.routers.owncloud.entrypoints=websecure
      - traefik.http.routers.owncloud.tls=true
      - traefik.http.routers.owncloud.tls.certresolver=letsencrypt
      - traefik.http.services.owncloud.loadbalancer.server.port=8080
      - traefik.docker.network=coolify
      - traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https
      - traefik.http.routers.owncloud.middlewares=redirect-to-https
  mariadb:
    image: 'mariadb:10.11'
    container_name: owncloud_mariadb
    restart: always
    environment:
      - 'MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD:-owncloud}'
      - MYSQL_USER=owncloud
      - 'MYSQL_PASSWORD=${DB_PASSWORD:-owncloud}'
      - MYSQL_DATABASE=owncloud
      - MARIADB_AUTO_UPGRADE=1
    command:
      - '--max-allowed-packet=128M'
      - '--innodb-log-file-size=64M'
    healthcheck:
      test:
        - CMD
        - mysqladmin
        - ping
        - '-h'
        - localhost
        - '-u'
        - owncloud
        - '-p${DB_PASSWORD:-owncloud}'
      interval: 5s
      timeout: 2s
      retries: 10
    volumes:
      - 'mysql:/var/lib/mysql'
  redis:
    image: 'redis:6'
    container_name: owncloud_redis
    restart: always
    command:
      - '--databases'
      - '1'
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - 'redis:/data'
  collabora:
    image: collabora/code
    container_name: owncloud_collabora
    restart: always
    environment:
      - 'aliasgroup1=https://documents\.mydomain\.com:443'
      - 'extra_params=--o:ssl.enable=false --o:ssl.termination=true'
      - dictionaries=en_US
      - 'username=${COLLABORA_USER}'
      - 'password=${COLLABORA_PASSWORD}'
    cap_add:
      - MKNOD
    healthcheck:
      test:
        - CMD
        - timeout
        - '-k'
        - 2s
        - 1s
        - bash
        - '-c'
        - 'echo > /dev/tcp/127.0.0.1/9980'
      interval: 10s
      timeout: 5s
      retries: 3
    labels:
      - traefik.enable=true
      - 'traefik.http.routers.collabora.rule=Host(`${COLLAB_DOMAIN}`)'
      - traefik.http.routers.collabora.entrypoints=websecure
      - traefik.http.routers.collabora.tls=true
      - traefik.http.routers.collabora.tls.certresolver=letsencrypt
      - traefik.http.services.collabora.loadbalancer.server.port=9980
      - traefik.docker.network=coolify
